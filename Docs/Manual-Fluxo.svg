<svg viewBox="0 0 1180 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#b9b1e8"/>
    </marker>
    <marker id="arrowG" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#d9a32a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="560" rx="16" fill="#ffffff"/>
  <text x="28" y="40" font-size="23" font-weight="700" fill="#233140">ProjectYard — Por onde começar e que fluxo seguir</text>
  <text x="28" y="64" font-size="13.5" fill="#6b7681">Ordem recomendada de preenchimento. A preparação faz-se uma vez; depois é só operar — o acompanhamento sai sozinho.</text>

  <!-- ===== 5 ETAPAS ===== -->
  <!-- Etapa 1 -->
  <g>
    <rect x="24" y="86" width="212" height="286" rx="13" fill="#faf9ff" stroke="#e3def9"/>
    <circle cx="54" cy="120" r="16" fill="#6a5af9"/><text x="54" y="126" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="80" y="116" font-size="14.5" font-weight="700" fill="#233140">PREPARAR</text>
    <text x="80" y="133" font-size="11.5" fill="#6b7681">Definições · uma vez</text>
    <g font-size="12.5" fill="#233140">
      <rect x="38" y="160" width="184" height="38" rx="9" fill="#fff" stroke="#e3def9"/><text x="50" y="184">Conta: dados + logótipo</text>
      <rect x="38" y="206" width="184" height="38" rx="9" fill="#fff" stroke="#e3def9"/><text x="50" y="230">Listas: Fases, tipos</text>
      <rect x="38" y="252" width="184" height="38" rx="9" fill="#fff" stroke="#e3def9"/><text x="50" y="276">Equipa: convidar pessoas</text>
    </g>
  </g>
  <!-- Etapa 2 -->
  <g>
    <rect x="254" y="86" width="212" height="286" rx="13" fill="#faf9ff" stroke="#e3def9"/>
    <circle cx="284" cy="120" r="16" fill="#6a5af9"/><text x="284" y="126" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="310" y="116" font-size="14.5" font-weight="700" fill="#233140">DADOS BASE</text>
    <text x="310" y="133" font-size="11.5" fill="#6b7681">a espinha dorsal</text>
    <g font-size="12.5" fill="#233140">
      <rect x="268" y="160" width="184" height="38" rx="9" fill="#fff" stroke="#e3def9"/><text x="280" y="184">Clientes: criar</text>
      <rect x="268" y="206" width="184" height="56" rx="9" fill="#fff" stroke="#e3def9"/><text x="280" y="228">Projetos: criar +</text><text x="280" y="246">Cliente + Gestor + datas</text>
    </g>
  </g>
  <!-- Etapa 3 -->
  <g>
    <rect x="484" y="86" width="212" height="286" rx="13" fill="#faf9ff" stroke="#e3def9"/>
    <circle cx="514" cy="120" r="16" fill="#6a5af9"/><text x="514" y="126" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="540" y="116" font-size="14.5" font-weight="700" fill="#233140">DETALHE</text>
    <text x="540" y="133" font-size="11.5" fill="#6b7681">dentro de cada projeto</text>
    <g font-size="12.5" fill="#233140">
      <rect x="498" y="155" width="184" height="34" rx="9" fill="#fff" stroke="#e3def9"/><text x="510" y="177">Fases do projeto</text>
      <rect x="498" y="195" width="184" height="34" rx="9" fill="#fff" stroke="#e3def9"/><text x="510" y="217">Tarefas (Kanban)</text>
      <rect x="498" y="235" width="184" height="34" rx="9" fill="#fff" stroke="#e3def9"/><text x="510" y="257">Entregáveis</text>
      <rect x="498" y="275" width="184" height="34" rx="9" fill="#fff" stroke="#e3def9"/><text x="510" y="297">Cronograma</text>
    </g>
  </g>
  <!-- Etapa 4 -->
  <g>
    <rect x="714" y="86" width="212" height="286" rx="13" fill="#faf9ff" stroke="#e3def9"/>
    <circle cx="744" cy="120" r="16" fill="#6a5af9"/><text x="744" y="126" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="770" y="116" font-size="14.5" font-weight="700" fill="#233140">OPERAR</text>
    <text x="770" y="133" font-size="11.5" fill="#6b7681">o dia-a-dia</text>
    <g font-size="12.5" fill="#233140">
      <rect x="728" y="155" width="184" height="34" rx="9" fill="#fff" stroke="#e3def9"/><text x="740" y="177">Registo de horas</text>
      <rect x="728" y="195" width="184" height="34" rx="9" fill="#fff" stroke="#e3def9"/><text x="740" y="217">Documentos</text>
      <rect x="728" y="235" width="184" height="34" rx="9" fill="#fff" stroke="#e3def9"/><text x="740" y="257">Aprovações</text>
      <rect x="728" y="275" width="184" height="34" rx="9" fill="#fff" stroke="#e3def9"/><text x="740" y="297">Chat · Calendário</text>
    </g>
  </g>
  <!-- Etapa 5 -->
  <g>
    <rect x="944" y="86" width="212" height="286" rx="13" fill="#fff8e9" stroke="#f0deb3"/>
    <circle cx="974" cy="120" r="16" fill="#d9a32a"/><text x="974" y="126" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="1000" y="116" font-size="14.5" font-weight="700" fill="#233140">ACOMPANHAR</text>
    <text x="1000" y="133" font-size="11.5" fill="#a87c18">automático</text>
    <g font-size="12.5" fill="#233140">
      <rect x="958" y="160" width="184" height="38" rx="9" fill="#fff" stroke="#f0deb3"/><text x="970" y="184">Dashboard</text>
      <rect x="958" y="206" width="184" height="38" rx="9" fill="#fff" stroke="#f0deb3"/><text x="970" y="230">Relatórios</text>
      <rect x="958" y="252" width="184" height="38" rx="9" fill="#fff" stroke="#f0deb3"/><text x="970" y="276">Pagamentos / Faturação</text>
    </g>
  </g>

  <!-- setas entre etapas -->
  <line x1="240" y1="215" x2="250" y2="215" stroke="#b9b1e8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="215" x2="480" y2="215" stroke="#b9b1e8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="215" x2="710" y2="215" stroke="#b9b1e8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="930" y1="215" x2="940" y2="215" stroke="#d9a32a" stroke-width="2.5" marker-end="url(#arrowG)"/>

  <!-- ===== COMO OS DADOS SE LIGAM ===== -->
  <rect x="24" y="400" width="1132" height="140" rx="13" fill="#f4f3fb" stroke="#e3def9"/>
  <text x="44" y="430" font-size="15" font-weight="700" fill="#233140">Como os dados se ligam — só crias o início; o resto deriva sozinho</text>

  <g font-size="13">
    <rect x="44" y="450" width="120" height="44" rx="10" fill="#6a5af9"/><text x="104" y="477" fill="#fff" font-weight="700" text-anchor="middle">Clientes</text>
    <line x1="170" y1="472" x2="190" y2="472" stroke="#b9b1e8" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="196" y="450" width="120" height="44" rx="10" fill="#6a5af9"/><text x="256" y="477" fill="#fff" font-weight="700" text-anchor="middle">Projetos</text>
    <line x1="322" y1="472" x2="342" y2="472" stroke="#b9b1e8" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="348" y="450" width="266" height="44" rx="10" fill="#ece9fd" stroke="#d9d2f7"/><text x="481" y="477" fill="#3a2f8f" font-weight="600" text-anchor="middle">Tarefas · Entregáveis · Horas</text>
    <line x1="620" y1="472" x2="640" y2="472" stroke="#d9a32a" stroke-width="2.5" marker-end="url(#arrowG)"/>
    <rect x="646" y="450" width="300" height="44" rx="10" fill="#fdf3da" stroke="#f0deb3"/><text x="796" y="477" fill="#8a6410" font-weight="600" text-anchor="middle">Dashboard · Relatórios · Faturação</text>
  </g>
  <text x="44" y="522" font-size="12.5" fill="#6b7681">Tu preenches Clientes, Projetos e o trabalho do dia. O acompanhamento (Dashboard, Relatórios, % de conclusão, faturação) é calculado automaticamente a partir desses dados.</text>
</svg>
