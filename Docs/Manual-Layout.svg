<svg viewBox="0 0 1120 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <rect x="0" y="0" width="1120" height="700" rx="14" fill="#ffffff"/>
  <text x="26" y="34" font-size="20" font-weight="700" fill="#233140">A aplicação num relance</text>
  <text x="26" y="55" font-size="12.5" fill="#6b7681">Barra lateral (navegação por grupos) à esquerda · área de trabalho do ecrã escolhido à direita.</text>

  <!-- ===== Moldura da app ===== -->
  <g>
    <rect x="26" y="72" width="1068" height="548" rx="12" fill="#f7f6fb" stroke="#e3def9"/>

    <!-- Sidebar escura -->
    <rect x="26" y="72" width="232" height="548" rx="12" fill="#233140"/>
    <rect x="246" y="72" width="12" height="548" fill="#233140"/>
    <!-- brand -->
    <rect x="44" y="90" width="26" height="26" rx="7" fill="#6a5af9"/><text x="57" y="108" font-size="13" font-weight="800" fill="#fff" text-anchor="middle">P</text>
    <text x="80" y="103" font-size="13.5" font-weight="700" fill="#fff">ProjectYard</text>
    <text x="80" y="116" font-size="9" fill="#9aa6b2">Plan · Build · Deliver</text>
    <!-- workspace chip -->
    <rect x="44" y="128" width="170" height="34" rx="8" fill="#2f3d4d"/>
    <rect x="52" y="135" width="20" height="20" rx="5" fill="#fff"/>
    <text x="80" y="149" font-size="11.5" font-weight="600" fill="#e7ebf0">O teu gabinete</text>
    <!-- search -->
    <rect x="44" y="170" width="170" height="28" rx="8" fill="#2a3744" stroke="#3a4a59"/>
    <text x="56" y="188" font-size="11" fill="#9aa6b2">⌘K  Procurar…</text>

    <!-- grupos + itens -->
    <g font-size="11" fill="#c4ccd4">
      <text x="44" y="222" font-size="9" font-weight="700" fill="#6f7c89" letter-spacing="1">WORKSPACE</text>
      <text x="48" y="240">Dashboard</text>
      <rect x="40" y="246" width="178" height="20" rx="6" fill="#6a5af9"/><text x="48" y="260" fill="#fff" font-weight="700">Projetos</text>
      <text x="48" y="280">Tarefas</text>
      <text x="48" y="298">Cronograma</text>
      <text x="48" y="316">Calendário</text>
      <text x="48" y="334">Registo de horas</text>

      <text x="44" y="360" font-size="9" font-weight="700" fill="#6f7c89" letter-spacing="1">COMERCIAL</text>
      <text x="48" y="378">Clientes</text>
      <text x="48" y="396">Entregáveis</text>
      <text x="48" y="414">Pagamentos</text>

      <text x="44" y="440" font-size="9" font-weight="700" fill="#6f7c89" letter-spacing="1">COMUNICAÇÃO</text>
      <text x="48" y="458">Chat</text>
      <text x="48" y="476">Correio</text>
      <text x="48" y="494">SMS</text>

      <text x="44" y="520" font-size="9" font-weight="700" fill="#6f7c89" letter-spacing="1">CONTROLO</text>
      <text x="48" y="538">Relatórios · Aprovações</text>
      <text x="48" y="556">Documentos · Riscos…</text>
    </g>
    <line x1="40" y1="578" x2="218" y2="578" stroke="#3a4a59"/>
    <text x="48" y="598" font-size="11.5" font-weight="700" fill="#e7ebf0">⚙  Definições</text>

    <!-- ===== Conteúdo ===== -->
    <text x="282" y="112" font-size="19" font-weight="700" fill="#233140">Projetos</text>
    <text x="282" y="132" font-size="11.5" fill="#6b7681">Todos os projetos do gabinete</text>
    <rect x="934" y="92" width="138" height="34" rx="9" fill="#6a5af9"/><text x="1003" y="114" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">+ Novo projeto</text>

    <!-- KPIs -->
    <g>
      <rect x="282" y="150" width="180" height="60" rx="10" fill="#fff" stroke="#e3def9"/><text x="298" y="178" font-size="20" font-weight="800" fill="#233140">12</text><text x="298" y="196" font-size="10.5" fill="#6b7681">Projetos</text>
      <rect x="474" y="150" width="180" height="60" rx="10" fill="#fff" stroke="#e3def9"/><text x="490" y="178" font-size="20" font-weight="800" fill="#18b07b">8</text><text x="490" y="196" font-size="10.5" fill="#6b7681">Em curso</text>
      <rect x="666" y="150" width="180" height="60" rx="10" fill="#fff" stroke="#e3def9"/><text x="682" y="178" font-size="20" font-weight="800" fill="#e8526b">2</text><text x="682" y="196" font-size="10.5" fill="#6b7681">Em risco</text>
    </g>
    <!-- linhas/cartões -->
    <g>
      <rect x="282" y="226" width="790" height="46" rx="9" fill="#fff" stroke="#e3def9"/><text x="298" y="254" font-size="12.5" font-weight="700" fill="#233140">PRJ-007 · Posto Viseu</text><rect x="940" y="240" width="80" height="20" rx="10" fill="#efedfd"/><text x="980" y="254" font-size="10" fill="#6a5af9" text-anchor="middle">Proposta</text>
      <rect x="282" y="280" width="790" height="46" rx="9" fill="#fff" stroke="#e3def9"/><text x="298" y="308" font-size="12.5" font-weight="700" fill="#233140">PRJ-005 · Edif. Almada</text><rect x="940" y="294" width="80" height="20" rx="10" fill="#e7f7f0"/><text x="980" y="308" font-size="10" fill="#18b07b" text-anchor="middle">Em curso</text>
      <rect x="282" y="334" width="790" height="46" rx="9" fill="#fff" stroke="#e3def9"/><text x="298" y="362" font-size="12.5" font-weight="700" fill="#233140">PRJ-001 · Orçamento ARL</text><rect x="940" y="348" width="80" height="20" rx="10" fill="#efedfd"/><text x="980" y="362" font-size="10" fill="#6a5af9" text-anchor="middle">Proposta</text>
      <rect x="282" y="388" width="790" height="46" rx="9" fill="#fff" stroke="#eef0f3"/>
      <rect x="282" y="442" width="790" height="46" rx="9" fill="#fff" stroke="#eef0f3"/>
      <rect x="282" y="496" width="790" height="46" rx="9" fill="#fff" stroke="#eef0f3"/>
    </g>
  </g>

  <!-- ===== Chamadas numeradas ===== -->
  <g font-weight="700">
    <circle cx="232" cy="145" r="11" fill="#fff" stroke="#6a5af9" stroke-width="2"/><text x="232" y="149" font-size="12" fill="#6a5af9" text-anchor="middle">1</text>
    <circle cx="232" cy="184" r="11" fill="#fff" stroke="#6a5af9" stroke-width="2"/><text x="232" y="188" font-size="12" fill="#6a5af9" text-anchor="middle">2</text>
    <circle cx="232" cy="253" r="11" fill="#fff" stroke="#6a5af9" stroke-width="2"/><text x="232" y="257" font-size="12" fill="#6a5af9" text-anchor="middle">3</text>
    <circle cx="232" cy="592" r="11" fill="#fff" stroke="#6a5af9" stroke-width="2"/><text x="232" y="596" font-size="12" fill="#6a5af9" text-anchor="middle">4</text>
    <circle cx="920" cy="109" r="11" fill="#fff" stroke="#6a5af9" stroke-width="2"/><text x="920" y="113" font-size="12" fill="#6a5af9" text-anchor="middle">5</text>
  </g>

  <!-- Legenda -->
  <g font-size="11.5" fill="#3a3a3a">
    <text x="26" y="648" font-weight="700" fill="#233140">①</text><text x="44" y="648">Logótipo do gabinete</text>
    <text x="232" y="648" font-weight="700" fill="#233140">②</text><text x="250" y="648">Pesquisa rápida (⌘K)</text>
    <text x="430" y="648" font-weight="700" fill="#233140">③</text><text x="448" y="648">Menu por grupos — clica para navegar</text>
    <text x="26" y="674" font-weight="700" fill="#233140">④</text><text x="44" y="674">Definições: conta, equipa, listas</text>
    <text x="430" y="674" font-weight="700" fill="#233140">⑤</text><text x="448" y="674">Ação do ecrã (ex.: criar Novo projeto)</text>
  </g>
</svg>
