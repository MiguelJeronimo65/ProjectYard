<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProjectYard</title>
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#233140; --navy-700:#1a2531; --accent:#d9a32a; --accent-2:#e6b540;
    --paper:#f3f1ec; --muted:#6b7681;
    --fd:'Space Grotesk',sans-serif; --fb:'Plus Jakarta Sans',sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:var(--fb); color:var(--navy); background:var(--paper);
    min-height:100svh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  /* blueprint backdrop */
  .bg{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .bg__grid{ position:absolute; inset:-2px;
    background-image:
      linear-gradient(to right, rgba(35,49,64,.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(35,49,64,.05) 1px, transparent 1px),
      linear-gradient(to right, rgba(35,49,64,.075) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(35,49,64,.075) 1px, transparent 1px);
    background-size:28px 28px,28px 28px,140px 140px,140px 140px;
    -webkit-mask-image:radial-gradient(circle at 50% 45%, #000 30%, transparent 78%);
            mask-image:radial-gradient(circle at 50% 45%, #000 30%, transparent 78%);
  }
  .bg__reticle{ position:absolute; width:230px; height:230px; border:1px solid rgba(35,49,64,.10); }
  .bg__reticle.tl{ top:54px; left:54px; border-right:none; border-bottom:none; }
  .bg__reticle.br{ bottom:54px; right:54px; border-left:none; border-top:none; }

  .stage{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:30px; opacity:1; }

  /* logo panel */
  .logo{ width:min(340px,76vw); height:auto; display:block;
    filter:drop-shadow(0 18px 36px rgba(35,49,64,.14)); }

  .ldg{ font-family:var(--fd); font-size:12px; letter-spacing:.34em; text-transform:uppercase; color:#a87c18; }
  .ldg i{ font-style:normal; animation:fade 1.4s infinite; } .ldg i:nth-child(2){animation-delay:.2s} .ldg i:nth-child(3){animation-delay:.4s}
  @keyframes fade{ 0%,100%{opacity:.3} 50%{opacity:1} }

  /* progress bar */
  .pbar{ width:min(300px,70vw); height:4px; border-radius:99px; background:rgba(35,49,64,.10); overflow:hidden; }
  .pbar i{ display:block; height:100%; width:0; border-radius:99px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2)); animation:fill 2.6s cubic-bezier(.5,0,.2,1) forwards; }
  @keyframes fill{ 0%{ width:6%; } 55%{ width:62%; } 85%{ width:88%; } 100%{ width:100%; } }

  /* footer wordmark / version */
  .foot{ position:absolute; bottom:30px; z-index:1; text-align:center; opacity:1; }
  .foot .tag{ font-family:var(--fd); font-weight:600; font-size:11px; letter-spacing:.32em; text-transform:uppercase; color:var(--muted); }
  .foot .tag b{ color:var(--accent); font-weight:600; }

  @keyframes rise{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
  <div class="bg">
    <div class="bg__grid"></div>
    <div class="bg__reticle tl"></div>
    <div class="bg__reticle br"></div>
  </div>

  <div class="stage">
    <img class="logo" src="logo.jpg" alt="ProjectYard — Plan. Build. Deliver." />
    <div class="pbar"><i></i></div>
    <div class="ldg"><i>A</i> <i>carregar</i> <i>…</i></div>
  </div>

  <div class="foot">
    <div class="tag">Plan <b>·</b> Build <b>·</b> Deliver</div>
  </div>
</body>
</html>
