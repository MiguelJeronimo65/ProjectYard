<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProjectYard — Loader (componente final)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* =========================================================
     ProjectYard — INDICADOR DE CARREGAMENTO (L1)
     Anel dourado a girar à volta do símbolo da marca.
     Usa a imagem do emblema: py-loader-mark.png (= favicon 512).
     ========================================================= */
  :root{
    --navy:#233140; --accent:#d9a32a; --paper:#f3f1ec; --muted:#6b7681;
    --fd:'Space Grotesk',sans-serif; --fb:'Plus Jakarta Sans',sans-serif;
  }

  /* ---- núcleo do spinner (reutilizável em 3 tamanhos) ---- */
  .py-loader{ position:relative; display:flex; align-items:center; justify-content:center; }
  .py-loader__ring{ position:absolute; inset:0; width:100%; height:100%; animation:py-spin 1s linear infinite; }
  .py-loader__mark{ display:flex; align-items:center; justify-content:center; background:#fff;
    border-radius:22%; box-shadow:0 6px 16px -8px rgba(35,49,64,.5); border:1px solid rgba(35,49,64,.08); }
  .py-loader__mark img{ width:76%; height:auto; display:block; }
  @keyframes py-spin{ to{ transform:rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){ .py-loader__ring{ animation-duration:2.4s; } }

  /* tamanhos */
  .py-loader.lg{ width:96px; height:96px; }   .py-loader.lg .py-loader__mark{ width:60px; height:60px; }
  .py-loader.md{ width:60px; height:60px; }   .py-loader.md .py-loader__mark{ width:38px; height:38px; }
  .py-loader.sm{ width:30px; height:30px; }   .py-loader.sm .py-loader__mark{ width:19px; height:19px; }
  .py-loader.sm .py-loader__mark{ box-shadow:none; border:none; background:transparent; }

  .py-loading-text{ font-family:var(--fd); font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:#a87c18; }
  .py-loading-text i{ font-style:normal; animation:py-fade 1.4s infinite; }
  .py-loading-text i:nth-child(2){animation-delay:.2s} .py-loading-text i:nth-child(3){animation-delay:.4s}
  @keyframes py-fade{ 0%,100%{opacity:.3} 50%{opacity:1} }

  /* ---- overlay de ecrã (véu claro) ---- */
  .py-overlay{ position:absolute; inset:0; z-index:1000; display:flex; flex-direction:column; gap:18px;
    align-items:center; justify-content:center; background:rgba(243,241,236,.80); backdrop-filter:blur(2px);
    opacity:0; visibility:hidden; transition:opacity .25s, visibility .25s; }
  .py-overlay.show{ opacity:1; visibility:visible; }

  /* =================== só para esta página de demonstração =================== */
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:var(--fb); color:var(--navy); background:var(--paper);
    background-image:linear-gradient(to right,rgba(35,49,64,.045) 1px,transparent 1px),linear-gradient(to bottom,rgba(35,49,64,.045) 1px,transparent 1px);
    background-size:26px 26px; padding:44px 24px 60px; }
  .head{ text-align:center; max-width:680px; margin:0 auto 36px; }
  .head .kick{ font-family:var(--fd); font-weight:600; font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:#a87c18; }
  .head h1{ font-family:var(--fd); font-weight:700; font-size:27px; margin:9px 0 6px; letter-spacing:-.02em; }
  .head p{ color:var(--muted); margin:0; font-size:14.5px; }
  .row{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; max-width:920px; margin:0 auto; }
  @media (max-width:820px){ .row{ grid-template-columns:1fr; max-width:420px; } }
  .demo{ background:#fff; border:1px solid rgba(35,49,64,.10); border-radius:16px; box-shadow:0 14px 40px -26px rgba(35,49,64,.5);
    padding:24px; min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; position:relative; overflow:hidden; }
  .demo .lab{ position:absolute; top:12px; left:14px; font-family:var(--fd); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
  .btn{ font-family:var(--fb); font-weight:600; font-size:13px; border:none; border-radius:9px; padding:10px 16px; cursor:pointer; background:var(--navy); color:#fff; display:inline-flex; align-items:center; gap:9px; }
  .mock{ width:100%; display:flex; flex-direction:column; gap:9px; }
  .mock .ln{ height:11px; border-radius:5px; background:#eceae4; }
  .mock .ln:nth-child(1){ width:80%; } .mock .ln:nth-child(2){ width:62%; } .mock .ln:nth-child(3){ width:71%; }
</style>
</head>
<body>
  <div class="head">
    <div class="kick">Componente final</div>
    <h1>Indicador de carregamento · L1</h1>
    <p>Um só componente, três tamanhos. Anel dourado a girar à volta do símbolo da marca.</p>
  </div>

  <div class="row">
    <!-- grande: overlay de ecrã -->
    <div class="demo" id="demoA">
      <div class="lab">Ecrã inteiro (véu claro)</div>
      <div class="mock"><div class="ln"></div><div class="ln"></div><div class="ln"></div></div>
      <button class="btn" onclick="screenLoad()">Carregar ecrã</button>
      <div class="py-overlay" id="ov">
        <div class="py-loader lg">
          <svg class="py-loader__ring" viewBox="0 0 96 96" fill="none">
            <circle cx="48" cy="48" r="44" stroke="rgba(35,49,64,.12)" stroke-width="4"/>
            <circle cx="48" cy="48" r="44" stroke="#d9a32a" stroke-width="4" stroke-linecap="round" stroke-dasharray="66 210"/>
          </svg>
          <div class="py-loader__mark"><img src="favicon-512.png" alt=""/></div>
        </div>
        <div class="py-loading-text"><i>A</i> <i>carregar</i> <i>…</i></div>
      </div>
    </div>

    <!-- médio: dentro de um card/secção -->
    <div class="demo">
      <div class="lab">Secção / card</div>
      <div class="py-loader md">
        <svg class="py-loader__ring" viewBox="0 0 96 96" fill="none">
          <circle cx="48" cy="48" r="44" stroke="rgba(35,49,64,.12)" stroke-width="5"/>
          <circle cx="48" cy="48" r="44" stroke="#d9a32a" stroke-width="5" stroke-linecap="round" stroke-dasharray="66 210"/>
        </svg>
        <div class="py-loader__mark"><img src="favicon-512.png" alt=""/></div>
      </div>
      <div class="py-loading-text"><i>A</i> <i>carregar</i> <i>…</i></div>
    </div>

    <!-- pequeno: dentro de um botão -->
    <div class="demo">
      <div class="lab">Inline (botão)</div>
      <button class="btn">
        <span class="py-loader sm">
          <svg class="py-loader__ring" viewBox="0 0 96 96" fill="none">
            <circle cx="48" cy="48" r="44" stroke="rgba(255,255,255,.25)" stroke-width="8"/>
            <circle cx="48" cy="48" r="44" stroke="#d9a32a" stroke-width="8" stroke-linecap="round" stroke-dasharray="66 210"/>
          </svg>
        </span>
        A guardar…
      </button>
    </div>
  </div>

  <script>
    function screenLoad(){
      const ov=document.getElementById('ov');
      ov.classList.add('show');
      setTimeout(()=>ov.classList.remove('show'), 1600);
    }
  </script>
</body>
</html>
